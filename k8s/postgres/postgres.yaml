apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: rag-system
type: Opaque
stringData:
  POSTGRES_USER: raguser
  POSTGRES_PASSWORD: ragpassword
  POSTGRES_DB: ragdb
  DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: rag-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "raguser", "-d", "ragdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: rag-system
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
