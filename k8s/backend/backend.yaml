apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: rag-system
data:
  QDRANT_HOST: qdrant
  QDRANT_PORT: "6333"
  FIRECRAWL_URL: http://firecrawl-api:3002
  FIRECRAWL_KEY: fc-local-key
  OLLAMA_URL: http://ollama:11434
  DATA_DIR: /app/data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  namespace: rag-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: rag-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - mountPath: /app/data
              name: backend-data
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: rag-system
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
