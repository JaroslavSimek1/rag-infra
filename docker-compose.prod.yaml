name: rag-prod

# IMAGE TAGS — update these when deploying new versions
# E.g. ghcr.io/your-org/rag-backend:sha-abc1234
#
# After setting up GitHub Actions, images are published automatically.
# Replace 'your-org' with your GitHub organization/user.

services:
  # ----- Firecrawl Engine (build from source) -----
  playwright-service:
    build:
      context: ../firecrawl-main/apps/playwright-service-ts
    environment:
      PORT: 3000
    networks:
      - backend

  firecrawl-api:
    build:
      context: ../firecrawl-main/apps/api
    environment:
      HOST: "0.0.0.0"
      PORT: 3002
      REDIS_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: firecrawlpassword
      POSTGRES_DB: firecrawl
      POSTGRES_HOST: nuq-postgres
      ENV: local
      NUM_WORKERS_PER_QUEUE: 4
    depends_on:
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nuq-postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    networks:
      - backend

  redis:
    image: redis:alpine
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  nuq-postgres:
    build:
      context: ../firecrawl-main/apps/nuq-postgres
    environment:
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: firecrawlpassword
      POSTGRES_DB: firecrawl
    command: ["postgres", "-c", "cron.database_name=firecrawl"]
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl -d firecrawl"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ----- Our Services (images from GHCR) -----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - backend

  backend:
    build:
      context: ../rag-backend
    environment:
      DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragdb
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FIRECRAWL_URL: http://firecrawl-api:3002
      FIRECRAWL_KEY: fc-local-key
      OLLAMA_URL: http://host.docker.internal:11434
      DATA_DIR: /app/data
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      firecrawl-api:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - backend

  frontend:
    build:
      context: ../rag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  backend_data:

networks:
  backend:
    driver: bridge
